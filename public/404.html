<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5.0, viewport-fit=cover">
    <title>DynaPerf</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the real URL in sessionStorage and redirects to index.html
      // index.html will restore the correct route via history.replaceState
      sessionStorage.redirect = location.href;
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
