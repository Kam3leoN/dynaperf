# Déclenche quotidiennement les Edge Functions de sauvegarde (JSON + dump SQL).
# Secrets GitHub (Settings → Secrets and variables → Actions) REQUIS :
#   SUPABASE_URL           — ex. https://xxxx.supabase.co (sans slash final)
#   SUPABASE_ANON_KEY      — clé anon (header apikey)
#   BACKUP_CRON_SECRET     — même valeur que le secret Edge BACKUP_CRON_SECRET
#
# Si le job échoue avec « No host part in the URL », vérifiez que ces trois secrets
# existent bien sur le dépôt (les workflows planifiés n’ont pas accès aux secrets « Environment »
# sauf si le job cible explicitement cet environment).
#
# Sur Supabase : déployer backup-all et sql-backup, définir BACKUP_CRON_SECRET,
# SUPABASE_DB_URL (sql-backup), et config.toml verify_jwt = false pour ces fonctions.

name: Supabase backups (CRON)

on:
  schedule:
    # 04:15 UTC tous les jours — ajuster si besoin
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  trigger-backups:
    runs-on: ubuntu-latest
    steps:
      - name: backup-all (JSON)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BACKUP_CRON_SECRET: ${{ secrets.BACKUP_CRON_SECRET }}
        run: |
          set -euo pipefail
          for v in SUPABASE_URL SUPABASE_ANON_KEY BACKUP_CRON_SECRET; do
            if [ -z "${!v:-}" ]; then
              echo "::error title=Secrets manquants::Ajoutez les secrets Actions du dépôt : SUPABASE_URL, SUPABASE_ANON_KEY, BACKUP_CRON_SECRET (voir entête du workflow)."
              exit 1
            fi
          done
          # Ne pas utiliser ${VAR%/} ici : le parseur GitHub peut tronquer l’URL (curl « No host part »).
          BASE_URL="$(printf '%s' "$SUPABASE_URL" | sed 's|/*$||')"
          curl -sfS -X POST \
            -H "Authorization: Bearer ${BACKUP_CRON_SECRET}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            "${BASE_URL}/functions/v1/backup-all"

      - name: sql-backup (SQL)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BACKUP_CRON_SECRET: ${{ secrets.BACKUP_CRON_SECRET }}
        run: |
          set -euo pipefail
          for v in SUPABASE_URL SUPABASE_ANON_KEY BACKUP_CRON_SECRET; do
            if [ -z "${!v:-}" ]; then
              echo "::error title=Secrets manquants::Ajoutez les secrets Actions du dépôt : SUPABASE_URL, SUPABASE_ANON_KEY, BACKUP_CRON_SECRET."
              exit 1
            fi
          done
          BASE_URL="$(printf '%s' "$SUPABASE_URL" | sed 's|/*$||')"
          curl -sfS -X POST \
            -H "Authorization: Bearer ${BACKUP_CRON_SECRET}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            "${BASE_URL}/functions/v1/sql-backup"
