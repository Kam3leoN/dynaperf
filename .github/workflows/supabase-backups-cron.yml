# Déclenche quotidiennement les Edge Functions de sauvegarde (JSON + dump SQL).
#
# Secrets GitHub (au moins un couple ci-dessous + BACKUP_CRON_SECRET) :
#   BACKUP_CRON_SECRET — obligatoire, même valeur que sur Supabase Edge
#   Clé « apikey » : SUPABASE_ANON_KEY **ou** VITE_SUPABASE_PUBLISHABLE_KEY (souvent la même valeur)
#   URL projet : SUPABASE_URL **ou** VITE_SUPABASE_URL — sinon déduit de supabase/config.toml
#
# SUPABASE_DB_URL sur GitHub ne sert pas à ce workflow (sql-backup lit Postgres côté Edge uniquement).
#
# Sur Supabase Edge : secrets + deploy backup-all / sql-backup, verify_jwt = false.

name: Supabase backups (CRON)

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-backups:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Appeler backup-all puis sql-backup
        env:
          GH_SECRET_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          GH_SECRET_VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          GH_SECRET_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GH_SECRET_VITE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          BACKUP_CRON_SECRET: ${{ secrets.BACKUP_CRON_SECRET }}
        shell: bash
        run: |
          set -euo pipefail

          # GitHub peut conserver un saut de ligne final au collage → curl envoie un header invalide
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }

          SUPABASE_ANON_KEY="$(trim "${GH_SECRET_SUPABASE_ANON_KEY:-}")"
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            SUPABASE_ANON_KEY="$(trim "${GH_SECRET_VITE_PUBLISHABLE_KEY:-}")"
          fi
          BACKUP_CRON_SECRET="$(trim "${BACKUP_CRON_SECRET:-}")"

          SUPABASE_URL_OVERRIDE="$(trim "${GH_SECRET_SUPABASE_URL:-}")"
          if [ -z "$SUPABASE_URL_OVERRIDE" ]; then
            SUPABASE_URL_OVERRIDE="$(trim "${GH_SECRET_VITE_SUPABASE_URL:-}")"
          fi

          if [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$BACKUP_CRON_SECRET" ]; then
            echo "::error title=Secrets Actions manquants::Définissez BACKUP_CRON_SECRET et une clé apikey : SUPABASE_ANON_KEY **ou** VITE_SUPABASE_PUBLISHABLE_KEY (comme dans votre .env). Optionnel : SUPABASE_URL ou VITE_SUPABASE_URL, sinon le workflow utilise supabase/config.toml."
            exit 1
          fi

          echo "::notice::Clés chargées (longueurs) : apikey=${#SUPABASE_ANON_KEY} chars, cron_secret=${#BACKUP_CRON_SECRET} chars."

          export SUPABASE_ANON_KEY

          if [ -n "$SUPABASE_URL_OVERRIDE" ]; then
            BASE_URL="$(printf '%s' "$SUPABASE_URL_OVERRIDE" | sed 's|/*$||')"
            echo "Using project URL from repository secret (SUPABASE_URL ou VITE_SUPABASE_URL)."
          else
            if [ ! -f supabase/config.toml ]; then
              echo "::error title=config manquant::supabase/config.toml introuvable après checkout."
              exit 1
            fi
            project_id="$(
              grep -E '^[[:space:]]*project_id[[:space:]]*=' supabase/config.toml \
                | head -1 \
                | sed -E 's/^[[:space:]]*project_id[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/'
            )"
            if [ -z "$project_id" ]; then
              echo "::error title=project_id introuvable::Vérifiez project_id dans supabase/config.toml."
              exit 1
            fi
            BASE_URL="https://${project_id}.supabase.co"
            echo "SUPABASE_URL=https://${project_id}.supabase.co (depuis config.toml)"
          fi

          # Le JWT anon contient "ref" = project ref ; doit correspondre à l’hôte *.supabase.co
          REF_FROM_JWT="$(python3 - <<'PY'
          import os, base64, json
          k = os.environ.get("SUPABASE_ANON_KEY", "")
          try:
              p = k.split(".")[1]
              p += "=" * (-len(p) % 4)
              d = json.loads(base64.urlsafe_b64decode(p.encode("ascii")))
              print(d.get("ref") or "")
          except Exception:
              print("")
          PY
          )"
          if echo "$BASE_URL" | grep -qE '\.supabase\.co$'; then
            HOST_REF="$(printf '%s' "$BASE_URL" | sed -E 's|^https?://||;s|\.supabase\.co/?$||')"
            if [ -n "$REF_FROM_JWT" ] && [ "$REF_FROM_JWT" != "$HOST_REF" ]; then
              echo "::error title=Clé / projet incohérents::Le JWT anon indique ref=\"${REF_FROM_JWT}\" mais l’URL appelle \"${HOST_REF}\". Utilisez la clé anon du même projet que l’URL, ou corrigez SUPABASE_URL / project_id dans config.toml."
              exit 1
            fi
          fi

          echo "::notice::Sauvegardes → ${BASE_URL}/functions/v1/…"

          curl_post() {
            local path="$1"
            local out code
            out="$(mktemp)"
            code="$(curl -sS -o "$out" -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${BACKUP_CRON_SECRET}" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              "${BASE_URL}/functions/v1/${path}")"
            if [[ ! "$code" =~ ^2[0-9]{2}$ ]]; then
              echo "::error title=${path} HTTP ${code}::Réponse : $(head -c 2000 "$out" | tr '\n' ' ')"
              exit 1
            fi
            rm -f "$out"
          }

          curl_post "backup-all"
          curl_post "sql-backup"

          echo "OK — backup-all et sql-backup ont répondu 2xx."
