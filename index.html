<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1, maximum-scale=5, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>DynaPerf</title>
    <meta name="description" content="Tableau de bord de suivi des audits partenaires agences. Performance, scores, progression collaborateurs.">
    <meta name="author" content="DynaPerf" />
    <!-- Réduit le risque de garder un vieux index.html en cache (références de chunks obsolètes après déploiement). -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="DynaPerf" />
    <meta property="og:description" content="Tableau de bord de suivi des audits partenaires agences. Performance, scores, progression collaborateurs." />
    <meta property="og:image" content="pwa-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DynaPerf" />
    <meta name="twitter:description" content="Tableau de bord de suivi des audits partenaires agences. Performance, scores, progression collaborateurs." />
    <meta name="twitter:image" content="pwa-512x512.png" />

    <link rel="icon" type="image/svg+xml" href="pwaDynaperf.svg" />
    <link rel="apple-touch-icon" href="pwa-192x192.png" />
    <meta name="theme-color" content="#ee4540" />
    <link rel="manifest" href="/manifest.json" />
  </head>

  <!-- Fond neutre : si le JS ne charge pas, éviter un écran rouge « vide » (le splash applique le rouge en overlay dans React). -->
  <body style="margin:0;background-color:#fff8f7">
    <div id="root">
      <div
        style="min-height:100vh;display:flex;align-items:center;justify-content:center;background-color:#fff8f7;color:#64748b;font-family:Roboto,system-ui,-apple-system,sans-serif;font-size:0.95rem"
        aria-live="polite"
      >
        Chargement…
      </div>
    </div>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
