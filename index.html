<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1, maximum-scale=5, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>DynaPerf</title>
    <meta name="description" content="Tableau de bord de suivi des audits partenaires agences. Performance, scores, progression collaborateurs.">
    <meta name="author" content="DynaPerf" />
    <!-- Réduit le risque de garder un vieux index.html en cache (références de chunks obsolètes après déploiement). -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="DynaPerf" />
    <meta property="og:description" content="Tableau de bord de suivi des audits partenaires agences. Performance, scores, progression collaborateurs." />
    <meta property="og:image" content="pwa-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DynaPerf" />
    <meta name="twitter:description" content="Tableau de bord de suivi des audits partenaires agences. Performance, scores, progression collaborateurs." />
    <meta name="twitter:image" content="pwa-512x512.png" />

    <link rel="icon" type="image/svg+xml" href="pwaDynaperf.svg" />
    <link rel="apple-touch-icon" href="pwa-192x192.png" />
    <meta name="theme-color" content="#0099ff" />
    <link rel="manifest" href="/manifest.json" />

    <!-- FOUC : classe `dark` + meta avant le premier paint (même règles que next-themes : storage `theme`, défaut light). Hex meta = FOUC_META_THEME_COLOR_* dans m3BrandTheme.ts -->
    <script>
      (function () {
        var isDark = false;
        try {
          var t = localStorage.getItem("theme");
          if (t === "dark") isDark = true;
          else if (t === "system")
            isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        } catch (e) {}
        if (isDark) document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
        try {
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta)
            meta.setAttribute(
              "content",
              isDark ? "#33adff" : "#0099ff"
            );
        } catch (e) {}
      })();
    </script>
    <!-- FOUC : variables alignées sur src/index.css :root / .dark (avant bundle Tailwind). -->
    <style id="fouc-critical">
      html {
        color-scheme: light;
        --fouc-bg: hsl(210 20% 98%);
        --fouc-fg: hsl(210 40% 10%);
        --fouc-muted: hsl(210 10% 46%);
      }
      html.dark {
        color-scheme: dark;
        --fouc-bg: hsl(220 30% 6%);
        --fouc-fg: hsl(210 10% 93%);
        --fouc-muted: hsl(210 10% 56%);
      }
      body {
        margin: 0;
        background-color: var(--fouc-bg);
        color: var(--fouc-fg);
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
        background-color: var(--fouc-bg);
      }
      #fouc-boot {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--fouc-bg);
        color: var(--fouc-muted);
        font-family: Roboto, system-ui, -apple-system, sans-serif;
        font-size: 0.95rem;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="fouc-boot" aria-live="polite">Chargement…</div>
    </div>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <script type="module" src="/src/entry.tsx"></script>
  </body>
</html>
